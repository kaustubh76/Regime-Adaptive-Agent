# D2 — auto-load any dashboard JSON dropped into /var/lib/grafana/dashboards.

apiVersion: 1

providers:
  - name: "ictbot"
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
