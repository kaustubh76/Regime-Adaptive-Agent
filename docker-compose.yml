services:
  scanner:
    build: .
    container_name: ictbot-scanner
    restart: unless-stopped
    env_file: .env
    ports:
      - "9100:9100"  # D1 Prometheus metrics endpoint
    volumes:
      - ./data:/app/data
    # Default CMD = `python -m ictbot scan` from the Dockerfile.

  # LEGACY (disabled): the Streamlit UI moved to the optional [ui] extra and was
  # replaced by the React SPA (web/ on Vercel) + the read-only FastAPI on Render —
  # the default image no longer contains streamlit, so this service would crash-loop.
  # To resurrect locally: add `pip install -e ".[ui]"` to the Dockerfile, then uncomment.
  # dashboard:
  #   build: .
  #   container_name: ictbot-dashboard
  #   restart: unless-stopped
  #   env_file: .env
  #   ports:
  #     - "8501:8501"
  #   volumes:
  #     - ./data:/app/data
  #   command: ["streamlit", "run", "src/ictbot/ui/app.py",
  #             "--server.address=0.0.0.0", "--server.port=8501"]

  # D2 (ROADMAP §D2): Prometheus scrapes the scanner; Grafana visualises.
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: ictbot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - scanner

  grafana:
    image: grafana/grafana:11.3.0
    container_name: ictbot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
